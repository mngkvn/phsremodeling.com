# ================================================================
# PHS Remodeling — Jekyll Build Configuration
# ================================================================
# This file contains ONLY Jekyll build settings.
# All editable site content lives in _data/*.yml files and is
# managed through the Decap CMS at /admin/.
# ================================================================

title:   "PHS Remodeling"
url:     "https://phsremodeling.com"   # live domain, no trailing slash
baseurl: ""                             # "" for custom domain; "/repo" for GH Pages subdomain

# Collections
collections:
  projects:
    output:  false
    sort_by: category_order

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: null

plugins:
  - jekyll-seo-tag

markdown:    kramdown
highlighter: rouge
permalink:   pretty
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
