# ================================================================
# Decap CMS — config.yml
# ================================================================
#
# RULE: every `file:` path in this config is UNIQUE.
#       No two panels ever write to the same file.
#       This is what prevents the duplicate-panel bug.
#
# DATA FILE MAP (what each panel edits):
#   _data/general.yml     ← Business name, footer, CTA, social
#   _data/hero.yml        ← Hero photo, headline, buttons
#   _data/services.yml    ← Hero service tags
#   _data/stats.yml       ← Stats bar numbers
#   _data/whyus.yml       ← Why Choose Us cards
#   _data/contact.yml     ← Phone, email, area, hours  ← ONE file, ONE panel
#   _data/testimonials.yml← Client reviews
#   _projects/*.md        ← Featured projects (folder collection)
#
# ── FIRST-TIME SETUP ─────────────────────────────────────────────
# 1. Create a GitHub App at https://github.com/settings/apps/new
#      Homepage URL:  https://phsremodeling.com
#      Callback URL:  https://phsremodeling.com/admin/
#      Permissions → Repository → Contents: Read & write
# 2. Install the App on your repository.
# 3. Copy the numeric App ID into `app_id` below.
# 4. Replace YOUR-GITHUB-USERNAME/YOUR-REPO-NAME.
# 5. Push to GitHub and visit phsremodeling.com/admin/
# ─────────────────────────────────────────────────────────────────

backend:
  name: git-gateway
  repo: mngkvn/phsremodeling.com
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/48886501-3e85-4e14-a1eb-5b29d478f21f/pkce
  auth_token_endpoint: /sites/48886501-3e85-4e14-a1eb-5b29d478f21f/token
  gateway_url: https://gateway.decapbridge.com                    # ← replace (numeric)

media_folder:  "assets/images/uploads"
public_folder: "/assets/images/uploads"

# ── Media library settings ────────────────────────────────────────
# IMPORTANT: Always use plain English filenames when uploading images.
# Avoid accents, spaces, or special characters — e.g. use "logo.png"
# not "ícono.png". GitHub Pages cannot reliably serve files with
# non-ASCII characters in the URL.
# Good:  logo.png   kitchen-remodel.jpg   hero-photo.webp
# Bad:   ícono.png  foto küche.jpg        remodel (1).png
# media_library:
#   name: default
#   config:
    # Sanitize filenames on upload — replaces spaces with hyphens
    # (Decap will still accept the upload but shows a warning for unsafe chars)
    # multiple: false

# ================================================================
# COLLECTION 1 — Featured Projects
# (folder collection — one .md file per project)
# ================================================================
collections:

  - name:  "projects"
    label: "⚒ Featured Projects"
    label_singular: "Project"
    folder: "_projects"
    create: true
    slug:   "{{category | slugify}}-{{category_order}}-{{slug}}"
    summary: "{{category}} #{{category_order}} — {{title}}"
    sortable_fields: ["category", "category_order", "title"]

    # Group the list by category in the CMS sidebar
    view_groups:
      - label: Category
        field: category

    fields:

      - label: "Project Title"
        name:  "title"
        widget: "string"
        hint:  "e.g. Kitchen Renovation — Westmont"

      - label: "Short Description"
        name:  "description"
        widget: "text"
        hint:  "2–3 sentences shown under the project title on the page."

      - label:   "Category"
        name:    "category"
        widget:  "select"
        hint:    "Projects sharing a category are grouped in the same carousel."
        options:
          - { label: "Kitchen",        value: "Kitchen" }
          - { label: "Bathroom",       value: "Bathroom" }
          - { label: "Basement",       value: "Basement" }
          - { label: "Exterior",       value: "Exterior" }
          - { label: "Roofing",        value: "Roofing" }
          - { label: "Siding",         value: "Siding" }
          - { label: "Windows & Doors", value: "Windows & Doors" }
          - { label: "Painting",       value: "Painting" }
          - { label: "Drywall",        value: "Drywall" }
          - { label: "Electrical",     value: "Electrical" }
          - { label: "Plumbing",       value: "Plumbing" }
          - { label: "Handyman",       value: "Handyman" }
          - { label: "Other",          value: "Other" }

      - label:      "Display Order (within category)"
        name:       "category_order"
        widget:     "number"
        value_type: int
        default:    1
        min:        1
        hint: >
          1 = shown first when the page loads.
          2 = reached by clicking the right arrow once. Etc.
          Numbers must be unique within each category.

      - label:   "Show on Website"
        name:    "featured"
        widget:  "boolean"
        default: true
        hint:    "Toggle off to hide this project without deleting it."

      - label: "Project Photos"
        name:  "images"
        widget: "list"
        label_singular: "Photo"
        max:   8
        hint: >
          The FIRST photo is displayed large (landscape/featured).
          All others fill the smaller grid slots.
          Best: 1200×900 px JPG or WebP under 400 KB.
        field:
          label:  "Photo"
          name:   "image"
          widget: "image"

  # (files collection — each entry maps to exactly ONE _data file)
  # ==============================================================
  - name:  "settings"
    label: "⚙ Site Settings"
    files:

      # ──────────────────────────────────────────────────────────
      # 1 of 7 — General / Business Info
      #   File: _data/general.yml   (unique — no other panel uses this)
      # ──────────────────────────────────────────────────────────
      - label: "General / Business Info"
        name:  "general"
        file:  "_data/general.yml"
        fields:

          - label: "Business Name"
            name:  "business_name"
            widget: "string"
            hint:  "Shown in the nav logo (when text mode is on), page title, and footer."

          - label: "Tagline / Domain"
            name:  "tagline"
            widget: "string"
            hint:  "Short line shown under the business name. e.g. phsremodeling.com"

          # ── Logo controls ────────────────────────────────────
          - label: "Nav Logo — Display Mode"
            name:  "logo_mode"
            widget: "select"
            default: "text"
            options:
              - label: "Text only (business name + tagline)"
                value: "text"
              - label: "Logo image only (hides text)"
                value: "image"
              - label: "Logo image + business name side by side"
                value: "image+text"
            hint:  "Controls what appears in the top-left corner of the navigation bar."

          - label: "Nav Logo — Image"
            name:  "logo_image"
            widget: "image"
            required: false
            hint: >
              Upload your logo file here (PNG with transparent background recommended).
              Supported: PNG, JPG, SVG, WebP.
              The image is only shown when Logo Display Mode is set to
              "Logo image only" or "Logo image + business name".

          - label: "Nav Logo — Image Height (pixels)"
            name:  "logo_height"
            widget: "number"
            default: 48
            value_type: int
            min: 20
            max: 80
            hint:  "How tall the logo image appears in the nav bar. 40–56 px looks best on most screens."

          - label: "Meta Description (SEO)"
            name:  "meta_description"
            widget: "text"
            hint:  "150–160 characters shown in Google search results."

          - label: "Footer Description"
            name:  "footer_description"
            widget: "text"
            hint:  "Short paragraph shown in the footer under the business name."

          - label: "CTA Banner — Eyebrow"
            name:  "cta_eyebrow"
            widget: "string"
            hint:  "Small label above the CTA heading. e.g. Free Consultation"

          - label: "CTA Banner — Heading"
            name:  "cta_heading"
            widget: "string"
            hint:  "Bold headline in the Call-to-Action banner between Projects and Reviews."

          - label: "CTA Banner — Subtext"
            name:  "cta_subtext"
            widget: "text"
            hint:  "Supporting sentence below the CTA heading."

          - label: "CTA Banner — Phone Button Label"
            name:  "cta_phone_label"
            widget: "string"
            hint:  "Label on the secondary button. e.g. Call Us Now"

          - label: "Contact Form — Formspree Endpoint"
            name:  "formspree_endpoint"
            widget: "string"
            required: false
            hint: >
              Paste your Formspree URL here to activate the contact form.
              Get it at formspree.io → New Form → copy the endpoint URL.
              Format: https://formspree.io/f/XXXXXXXX
              Leave empty to keep the form in demo mode (no emails sent).

          - label: "Updates Section — Heading"
            name:  "updates_heading"
            widget: "string"
            hint:  "Heading shown above the Facebook feed section."

          - label: "Updates Section — Subtext"
            name:  "updates_subtext"
            widget: "text"
            hint:  "Supporting sentence shown below the Updates heading."


      # ──────────────────────────────────────────────────────────
      # 1 of 9 — Facebook & Social  ← PASTE YOUR ELFSIGHT ID HERE
      #   File: _data/social.yml   (unique)
      # ──────────────────────────────────────────────────────────
      - label: "📘 Facebook & Social"
        name:  "social"
        file:  "_data/social.yml"
        fields:

          - label: "Facebook Page URL"
            name:  "facebook_url"
            widget: "string"
            required: false
            hint:  "Your full Facebook page URL — e.g. https://www.facebook.com/PHSRemodeling"

          - label: "Follow Button Label"
            name:  "facebook_follow_btn"
            widget: "string"
            default: "Follow Us on Facebook"
            hint:  "Text on the button visitors click to follow your page."

          - label: "🔑 Elfsight Widget ID"
            name:  "elfsight_widget_id"
            widget: "string"
            required: false
            hint: >
              HOW TO GET YOUR ID:
              1. Go to elfsight.com and log in
              2. Click "Create App" → choose "Facebook Feed"
              3. Select the Large layout, connect your Facebook page, click Publish
              4. Copy the embed code — it looks like:
                 <div class="elfsight-app-XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX"></div>
              5. Paste ONLY the ID part here (the text between "elfsight-app-" and the closing quote):
                 XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
              Leave empty to show a placeholder until your ID is ready.

          - label: "Section Heading"
            name:  "updates_heading"
            widget: "string"
            default: "Find Us on Facebook"
            hint:  "Heading shown above the Facebook widget."

          - label: "Section Subtext"
            name:  "updates_subtext"
            widget: "string"
            default: "Browse our latest project photos, before & afters, and client updates."
            hint:  "Short description shown below the heading."


      # ──────────────────────────────────────────────────────────
      # 2 of 9 — Section Visibility
      #   File: _data/visibility.yml   (unique)
      #
      #   Toggle any section on or off without touching code.
      #   Hero and Footer are always visible.
      # ──────────────────────────────────────────────────────────
      - label: "Section Visibility"
        name:  "visibility"
        file:  "_data/visibility.yml"
        fields:

          - label:   "Stats Bar"
            name:    "stats_bar"
            widget:  "boolean"
            default: true
            hint:    "Dark strip below the hero showing Years of Experience, Projects Completed, etc."

          - label:   "Why Choose Us"
            name:    "why_choose_us"
            widget:  "boolean"
            default: true
            hint:    "The 6-card grid explaining your company's values."

          - label:   "Featured Projects"
            name:    "featured_projects"
            widget:  "boolean"
            default: true
            hint:    "Category carousels showing your portfolio photos."

          - label:   "CTA Banner"
            name:    "cta_banner"
            widget:  "boolean"
            default: true
            hint:    "'Ready to Transform Your Home?' call-to-action strip."

          - label:   "Client Reviews"
            name:    "testimonials"
            widget:  "boolean"
            default: true
            hint:    "Testimonial cards from past clients."

          - label:   "Updates / Facebook Feed"
            name:    "updates_feed"
            widget:  "boolean"
            default: true
            hint:    "Social media embed section. Hide this until your Elfsight code is ready."

          - label:   "Contact Section"
            name:    "contact"
            widget:  "boolean"
            default: true
            hint:    "Contact form, phone, email, service area, and hours of service."


      # ──────────────────────────────────────────────────────────
      # 3 of 9 — Project Categories
      #   File: _data/categories.yml   (unique)
      #
      #   Defines the title and description shown in the header
      #   bar of each project carousel. The "name" field must
      #   match the Category set on each project exactly.
      # ──────────────────────────────────────────────────────────
      - label: "Project Categories"
        name:  "categories"
        file:  "_data/categories.yml"
        fields:
          - label: "Categories"
            name:  "items"
            widget: "list"
            label_singular: "Category"
            hint: >
              Each entry controls the header text for one carousel section.
              The Name field must exactly match the Category value set on projects
              (same capitalization). Add a new entry whenever you create a new
              project category.
            fields:
              - label: "Category Name"
                name:  "name"
                widget: "string"
                hint:  "Must match exactly — e.g. Kitchen, Bathroom, Exterior"
              - label: "Display Title"
                name:  "title"
                widget: "string"
                hint:  "Heading shown in the carousel bar — e.g. Kitchen Renovations"
              - label: "Short Description"
                name:  "description"
                widget: "string"
                hint:  "One sentence shown below the title — e.g. Custom cabinetry, countertops, and full rebuilds."


      # ──────────────────────────────────────────────────────────
      # 4 of 9 — Hero Section
      #   File: _data/hero.yml   (unique)
      # ──────────────────────────────────────────────────────────
      - label: "Hero Section"
        name:  "hero"
        file:  "_data/hero.yml"
        fields:

          - label: "Hero Background Photo"
            name:  "image"
            widget: "image"
            required: false
            hint: >
              Landscape photo, 1920×1080 px or wider.
              A dark gradient overlay is applied automatically so white text stays readable.
              Best subject: a finished kitchen, bathroom, or exterior renovation.

          - label: "Photo Alt Text (accessibility)"
            name:  "alt"
            widget: "string"
            default: "PHS Remodeling — Home Renovations"

          - label: "Eyebrow Text"
            name:  "eyebrow"
            widget: "string"
            hint:  "Small uppercase line above the main headline. e.g. PHS Remodeling"

          - label: "Main Headline — Line 1"
            name:  "headline_1"
            widget: "string"
            hint:  "First line of the bold Oswald headline. e.g. Built To Last."

          - label: "Main Headline — Line 2"
            name:  "headline_2"
            widget: "string"
            hint:  "Second line (displayed in outline/stroke style). e.g. Crafted With Pride."

          - label: "Sub Label"
            name:  "sub"
            widget: "string"
            hint:  "Small text above the service tags. e.g. Interior & Exterior Renovations"

          - label: "Primary Button Label"
            name:  "btn_primary"
            widget: "string"
            default: "Contact Us"

          - label: "Secondary Button Label"
            name:  "btn_ghost"
            widget: "string"
            default: "View Our Work"

          - label: "Trust Badge Text"
            name:  "trust_badge"
            widget: "string"
            default: "Licensed & Insured"


      # ──────────────────────────────────────────────────────────
      # 5 of 9 — Services List (hero tags)
      #   File: _data/services.yml   (unique)
      # ──────────────────────────────────────────────────────────
      - label: "Services List (Hero Tags)"
        name:  "services"
        file:  "_data/services.yml"
        fields:
          - label: "Services"
            name:  "list"
            widget: "list"
            label_singular: "Service"
            hint:  "Each item appears as a small tag in the hero section. Add, remove, or reorder freely."
            field:
              label:  "Service Name"
              name:   "item"
              widget: "string"


      # ──────────────────────────────────────────────────────────
      # 6 of 9 — Stats Bar
      #   File: _data/stats.yml   (unique)
      # ──────────────────────────────────────────────────────────
      - label: "Stats Bar"
        name:  "stats"
        file:  "_data/stats.yml"
        fields:
          - label: "Stats"
            name:  "items"
            widget: "list"
            label_singular: "Stat"
            max:   4
            hint:  "Up to 4 stats shown in the dark bar below the hero."
            fields:
              - label: "Value"
                name:  "number"
                widget: "string"
                hint:  "e.g. 15+  or  500+  or  98%"
              - label: "Label"
                name:  "label"
                widget: "string"
                hint:  "e.g. Years of Experience"


      # ──────────────────────────────────────────────────────────
      # 7 of 9 — Why Choose Us
      #   File: _data/whyus.yml   (unique)
      # ──────────────────────────────────────────────────────────
      - label: "Why Choose Us Cards"
        name:  "whyus"
        file:  "_data/whyus.yml"
        fields:
          - label: "Cards"
            name:  "items"
            widget: "list"
            label_singular: "Card"
            max:   6
            hint:  "Up to 6 cards shown in the grid. Each has a title and description."
            fields:
              - label: "Card Title"
                name:  "title"
                widget: "string"
              - label: "Card Description"
                name:  "description"
                widget: "text"


      # ──────────────────────────────────────────────────────────
      # 8 of 9 — Contact Info & Hours  ← ONE panel, ONE file
      #   File: _data/contact.yml   (unique)
      #
      #   This single file replaces the 3 separate _config.yml
      #   entries that caused the duplicate-panel bug.
      # ──────────────────────────────────────────────────────────
      - label: "Contact Info & Hours"
        name:  "contact"
        file:  "_data/contact.yml"
        fields:

          - label: "Phone Number"
            name:  "phone"
            widget: "string"
            hint:  "e.g. (708) 555-1234 — shown in the contact section, footer, and nav CTA."

          - label: "Email Address"
            name:  "email"
            widget: "string"
            hint:  "e.g. info@phsremodeling.com"

          - label: "Service Area"
            name:  "service_area"
            widget: "string"
            hint:  "e.g. Serving the Greater Chicago Area"

          - label: "Hours of Service"
            name:  "hours"
            widget: "list"
            label_singular: "Row"
            hint:  "Each row is one line in the hours table. Add extra rows for holidays etc."
            fields:
              - label: "Day(s)"
                name:  "day"
                widget: "string"
                hint:  "e.g. Mon – Sat"
              - label: "Time"
                name:  "time"
                widget: "string"
                hint:  "e.g. 9:00 AM – 5:00 PM  or  Closed"
              - label: "Currently Open?"
                name:  "open"
                widget: "boolean"
                default: true
                hint:  "Controls whether the green 'Open' or red 'Closed' badge is shown."


      # ──────────────────────────────────────────────────────────
      # 9 of 9 — Client Reviews / Testimonials
      #   File: _data/testimonials.yml   (unique)
      # ──────────────────────────────────────────────────────────
      - label: "Client Reviews"
        name:  "testimonials"
        file:  "_data/testimonials.yml"
        fields:
          - label: "Reviews"
            name:  "items"
            widget: "list"
            label_singular: "Review"
            hint:  "Add, edit, or remove client reviews. Shown in the Reviews section."
            fields:
              - label: "Client Name"
                name:  "name"
                widget: "string"
                hint:  "e.g. Michael & Sandra T."
              - label: "Location"
                name:  "location"
                widget: "string"
                hint:  "e.g. Oak Park, IL"
              - label: "Review Text"
                name:  "text"
                widget: "text"
              - label: "Project Type"
                name:  "project"
                widget: "string"
                hint:  "e.g. Kitchen — shown as the tag on the card."
              - label: "Star Rating"
                name:  "rating"
                widget: "number"
                default: 5
                min:    1
                max:    5
                value_type: int
